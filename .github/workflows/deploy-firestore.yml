name: Deploy Firestore Rules and Indexes

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - firestore.rules
      - firestore.indexes.json
      - firebase.json
      - .firebaserc
      - package.json
      - package-lock.json
      - tests/firestore-rules.test.mjs
      - .github/workflows/deploy-firestore.yml

permissions:
  contents: read
  id-token: write

concurrency:
  group: firestore-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to project-789b5025-7a3c-4b74-88b
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Authenticate with Workload Identity Federation
        id: auth
        uses: google-github-actions/auth@v3
        with:
          project_id: project-789b5025-7a3c-4b74-88b
          workload_identity_provider: projects/608095045728/locations/global/workloadIdentityPools/github-actions/providers/klas-main
          service_account: github-firestore-deployer@project-789b5025-7a3c-4b74-88b.iam.gserviceaccount.com
          create_credentials_file: true
          export_environment_variables: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up Java for Firestore validation
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Validate Firebase configuration
        shell: bash
        run: |
          set -euo pipefail
          test -s firebase.json
          test -s .firebaserc
          test -s firestore.rules
          test -s firestore.indexes.json
          jq empty firebase.json .firebaserc firestore.indexes.json
          grep -q '"rules": "firestore.rules"' firebase.json
          grep -q '"indexes": "firestore.indexes.json"' firebase.json
          grep -q 'project-789b5025-7a3c-4b74-88b' .firebaserc
          grep -q "sign_in_provider == 'google.com'" firestore.rules
          grep -q 'function isActiveMember()' firestore.rules
          grep -q 'function isProvisionedMember()' firestore.rules
          grep -q 'function canReadOwnProfile(uid)' firestore.rules
          grep -q "get('status', 'blocked') == 'active'" firestore.rules
          grep -q "get('status', 'pending') == 'pending'" firestore.rules
          grep -q "'uid', 'fullName', 'shortName', 'email', 'role', 'status', 'admin'" firestore.rules

      - name: Install pinned Firebase test tools
        run: |
          npm ci
          npm install --global firebase-tools@15.24.0

      - name: Test Firestore authorization rules
        run: npm run test:rules

      - name: Deploy Firestore rules and indexes
        shell: bash
        run: |
          set -euo pipefail
          firebase deploy \
            --only firestore \
            --project project-789b5025-7a3c-4b74-88b \
            --non-interactive

      - name: Deployment summary
        if: success()
        run: |
          echo "### Firestore deployment completed" >> "$GITHUB_STEP_SUMMARY"
          echo "- Authentication: Workload Identity Federation" >> "$GITHUB_STEP_SUMMARY"
          echo "- Project: \`project-789b5025-7a3c-4b74-88b\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Rules: \`firestore.rules\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Indexes: \`firestore.indexes.json\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Commit: \`${GITHUB_SHA}\`" >> "$GITHUB_STEP_SUMMARY"
